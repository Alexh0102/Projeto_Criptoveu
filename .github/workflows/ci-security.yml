name: CI Security

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build secure bundle
        run: npm run build:secure

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Report Vercel compatibility status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          state="success"
          description="Secure build passed"

          if [ "$JOB_STATUS" != "success" ]; then
            state="failure"
            description="Secure build did not pass"
          fi

          curl --fail-with-body \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "{\"state\":\"$state\",\"context\":\"Vercel\",\"description\":\"$description\",\"target_url\":\"$RUN_URL\"}"
