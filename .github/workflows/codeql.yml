name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write
  statuses: write

jobs:
  analyze:
    name: Analyze JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  report-required-status:
    name: Report required CodeQL status
    runs-on: ubuntu-latest
    needs: analyze
    if: always()

    steps:
      - name: Report CodeQL compatibility status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          state="success"
          description="CodeQL analysis passed"

          if [ "$ANALYZE_RESULT" != "success" ]; then
            state="failure"
            description="CodeQL analysis did not pass"
          fi

          curl --fail-with-body \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "{\"state\":\"$state\",\"context\":\"CodeQL\",\"description\":\"$description\",\"target_url\":\"$RUN_URL\"}"
